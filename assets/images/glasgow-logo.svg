<svg viewBox="0 0 100 45" xmlns="http://www.w3.org/2000/svg">
  <!-- University of Glasgow - simplified crest -->
  <defs>
    <linearGradient id="glasGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a3a5c"/>
      <stop offset="100%" stop-color="#0d2240"/>
    </linearGradient>
  </defs>
  <!-- Shield -->
  <path d="M15 5 L15 24 Q15 34 50 38 Q85 34 85 24 L85 5 L70 10 L50 5 L30 10 Z" fill="url(#glasGrad)" stroke="#c8a84e" stroke-width="0.5"/>
  <!-- Phoenix at top -->
  <path d="M50 6 Q48 8 49 10 Q50 9 51 10 Q52 8 50 6Z" fill="#c8a84e" opacity="0.9"/>
  <path d="M49 9 Q47 11 48 13 Q49 12 50 13 Q51 12 52 11 Q53 9 51 9" fill="none" stroke="#c8a84e" stroke-width="0.5" opacity="0.7"/>
  <!-- Tree -->
  <path d="M50 14 L50 20" stroke="#3a7a3a" stroke-width="1.5"/>
  <circle cx="50" cy="14" r="3" fill="#3a7a3a" opacity="0.8"/>
  <!-- Dove -->
  <path d="M49 14 Q48 13 49 12 Q50 13 51 14" fill="white" opacity="0.7"/>
  <!-- Fish -->
  <path d="M44 26 Q47 24 50 25 Q53 24 56 26 Q53 27 50 26 Q47 27 44 26Z" fill="white" opacity="0.5"/>
  <!-- Bells -->
  <path d="M22 8 Q21 12 22 15" stroke="#c8a84e" stroke-width="0.5" fill="none" opacity="0.6"/>
  <circle cx="22" cy="16" r="1.5" fill="#c8a84e" opacity="0.6"/>
  <path d="M78 8 Q79 12 78 15" stroke="#c8a84e" stroke-width="0.5" fill="none" opacity="0.6"/>
  <circle cx="78" cy="16" r="1.5" fill="#c8a84e" opacity="0.6"/>
  <!-- UofG text -->
  <text x="50" y="42" text-anchor="middle" fill="#1a3a5c" font-size="14" font-family="Georgia, serif" font-weight="bold" letter-spacing="2">UofG</text>
</svg>
